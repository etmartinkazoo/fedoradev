# Sane tmux defaults

# Set prefix to Ctrl-a (easier reach)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Mouse support
set -g mouse on

# History limit
set -g history-limit 50000

# Start window numbering at 1
set -g base-index 1
set -g pane-base-index 1

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# Escape time
set -sg escape-time 10

# Focus events
set -g focus-events on

# Set the default $TERM
set -g default-terminal "screen-256color"

# Status bar
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e] #S "
set -g status-left-style "none"
set -g status-right "#[fg=#a6adc8]%H:%M "
set -g status-right-style "none"
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=#89b4fa,fg=#1e1e2e] #I:#W "
set -g window-status-separator ""

# Message styling
set -g message-style "bg=#89b4fa,fg=#1e1e2e"
set -g message-command-style "bg=#89b4fa,fg=#1e1e2e"

# Pane borders
set -g pane-border-style "fg=#585b70"
set -g pane-active-border-style "fg=#89b4fa"

# Set detach on I/O
set -g detach-on-destroy off

# Key bindings
unbind '"'
unbind %

# Split panes using vim directions
bind | split-window -h
bind - split-window -v

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Pane killer (alt-x to kill pane)
bind -n M-x kill-pane

# Smart pane switching with awareness of Vim splits
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-l) || tmux select-pane -R"
